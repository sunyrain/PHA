export_filters:
  enabled: true
  min_publish_year: 2000
  journals: []
  publishers: []
  wos_subtypes:
  - Article
  - Article; Early Access
  elsevier_subtypes:
  - Article
  exclude_title_keywords:
  - review
  - mini-review
  - minireview
  - perspective
  - opinion
  - editorial
  - commentary
  - erratum
  - corrigendum
  - retraction
  - book review
  - meta-analysis
  - systematic review
  - bibliometric
  - scientometric
  - patent
  - molecular dynamics
  - density functional theory
  - DFT
  - QSAR
  exclude_abstract_keywords:
  - this review summarizes
  - this review discusses
  - this review highlights
  - in this review, we
  - herein, we review
  - bibliometric analysis
  - scientometric analysis
filtering:
  capacity_min: 0
  removal_efficiency_min: 0
  removal_efficiency_max: 100
  pH_min: 0
  pH_max: 14
  temperature_min_c: 0
  temperature_max_c: 100
  reject_missing_all: true
api:
  deepseek_api_key: ${DEEPSEEK_API_KEY}
