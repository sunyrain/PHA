  data_root: PHA/data
  databases_dir: PHA/data\databases
  downloads_dir: PHA/var\downloads
  extensions_dir: PHA/resources\extensions
  logs_dir: PHA/var\logs
  output_dir: PHA/data\processed
  temp_profiles_dir: PHA/var\temp_profiles
  text_mining_dir: PHA/data\processed\text_mining
files:
