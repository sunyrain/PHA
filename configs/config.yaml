  workers: 1
text_mining:
  elsevier_max_results: 50
  elsevier_max_workers: 4
  elsevier_queries:
  # Q1: quantitative hydrogel-protein adsorption records with property signals.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR "polymer gel*" OR cryogel* OR nanogel* OR microgel*
       OR "hydrogel bead*" OR "hydrogel microsphere*" OR "hydrogel membrane*")
      AND
      ("protein adsorption" OR "protein adsorb*" OR "protein sorption"
       OR "protein binding" OR "protein uptake" OR "nonspecific protein adsorption"
       OR "protein fouling")
      AND
      ("adsorption capacity" OR "binding capacity" OR isotherm* OR kinetic*
       OR Qmax OR "distribution coefficient" OR "adsorption mechanism"
       OR "surface charge" OR "charge density" OR "zeta potential"
       OR "swelling ratio" OR "water content" OR porosity OR "pore size"
       OR "mesh size" OR modulus OR "contact angle" OR hydrophilic*
       OR hydrophobic* OR "functional group*")
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q2: named target proteins used as adsorption probes.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR "polymer gel*" OR cryogel* OR nanogel* OR microgel*
       OR "hydrogel bead*" OR "hydrogel microsphere*" OR "hydrogel membrane*")
      AND
      ("bovine serum albumin" OR BSA OR "human serum albumin" OR HSA
       OR albumin OR lysozyme OR fibrinogen OR hemoglobin OR "cytochrome c"
       OR myoglobin OR ovalbumin OR trypsin OR pepsin OR insulin
       OR immunoglobulin* OR IgG OR antibody OR antibodies OR transferrin
       OR ferritin OR lactoferrin)
      AND
      (adsorp* OR sorption OR bind* OR uptake OR capture OR removal
       OR "fouling resistance" OR antifouling OR "anti-fouling")
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q3: biointerfaces and blood-contacting hydrogels with protein adsorption.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR "polymer gel*" OR cryogel* OR nanogel* OR microgel*
       OR "hydrogel coating*" OR "hydrogel membrane*" OR PVA OR PEG
       OR PEGDA OR GelMA OR alginate OR chitosan)
      AND
      ("protein adsorption" OR "serum protein adsorption"
       OR "plasma protein adsorption" OR "blood protein adsorption"
       OR "protein fouling")
      AND
      ("blood-contacting" OR hemocompatibility OR biointerface
       OR "platelet adhesion" OR "platelet activation" OR "cell adhesion"
       OR "complement activation" OR "foreign body response"
       OR wound OR dressing)
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q4: selective affinity, ion-exchange, chelating, aptamer, and imprinted hydrogels.
  - >-
    TITLE-ABS-KEY(
      ("molecularly imprinted hydrogel*" OR "protein imprinted hydrogel*"
       OR "protein-imprinted hydrogel*" OR "affinity hydrogel*"
       OR "ion-exchange hydrogel*" OR "ion exchange hydrogel*"
       OR "boronate affinity hydrogel*" OR "metal chelate hydrogel*"
       OR "chelating hydrogel*" OR "Ni-NTA hydrogel*" OR "aptamer hydrogel*"
       OR "cryogel column*" OR "hydrogel adsorbent*")
      AND
      (protein OR peptide OR albumin OR lysozyme OR hemoglobin
       OR immunoglobulin* OR IgG OR antibody OR enzyme)
      AND
      (adsorp* OR bind* OR capture OR recognition OR selectiv* OR separation)
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q5: low-adsorption / anti-fouling hydrogels as negative or weak-binding cases.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR "polymer gel*" OR cryogel* OR nanogel* OR microgel*
       OR "hydrogel coating*" OR "hydrogel surface*" OR "hydrogel membrane*")
      AND
      ("low protein adsorption" OR "reduced protein adsorption"
       OR "minimal protein adsorption" OR "resist protein adsorption"
       OR "protein resistant" OR protein-resistant OR "protein repellent"
       OR "fouling resistance" OR "protein fouling" OR biofouling
       OR antifouling OR "anti-fouling" OR zwitterionic OR PEGylated
       OR "poly(ethylene glycol)" OR "polyethylene glycol")
      AND
      (protein OR serum OR plasma OR albumin OR fibrinogen OR lysozyme
       OR immunoglobulin* OR antibody)
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q6: multi-protein competitive adsorption and protein corona on hydrogels.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR "polymer gel*" OR cryogel* OR nanogel* OR microgel*
       OR PVA OR PEG OR GelMA OR alginate OR chitosan)
      AND
      ("competitive adsorption" OR "competitive protein adsorption"
       OR "multi-protein adsorption" OR "protein corona" OR "protein exchange"
       OR "serum protein adsorption" OR "plasma protein adsorption"
       OR "Vroman effect")
      AND
      (protein OR serum OR plasma OR albumin OR fibrinogen
       OR immunoglobulin* OR antibody)
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q7: mechanism-centered adsorption papers where physical origin is explicit.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR "polymer gel*" OR cryogel* OR nanogel* OR microgel*)
      AND
      (protein OR albumin OR lysozyme OR fibrinogen OR hemoglobin
       OR immunoglobulin* OR antibody)
      AND
      (adsorp* OR sorption OR bind* OR fouling)
      AND
      (electrostatic* OR hydrophobic* OR hydrophilic* OR "hydrogen bonding"
       OR "van der Waals" OR "size exclusion" OR "mesh size" OR porosity
       OR "pore size" OR "charge density" OR "surface charge"
       OR "isoelectric point" OR pI OR "molecular imprinting"
       OR "affinity ligand" OR "conformation change" OR "protein unfolding"
       OR "protein corona" OR "competitive adsorption" OR "hydration layer")
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q8: hydrogel adsorbents for protein separation, purification, and reuse.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR cryogel* OR "hydrogel bead*" OR "hydrogel column*"
       OR "hydrogel monolith*" OR "hydrogel adsorbent*" OR "porous gel*")
      AND
      ("protein separation" OR "protein purification" OR "protein capture"
       OR "protein adsorption" OR "affinity chromatography"
       OR "ion exchange chromatography" OR "binding capacity"
       OR "dynamic binding capacity")
      AND
      (adsorp* OR bind* OR capture OR selectivity OR regeneration OR elution)
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q9: formulation, fabrication, and process-window papers linked to protein adsorption.
  - >-
    TITLE-ABS-KEY(
      (hydrogel* OR cryogel* OR nanogel* OR microgel*
       OR "hydrogel coating*" OR "hydrogel column*" OR "hydrogel membrane*")
      AND
      ("protein adsorption" OR "protein binding" OR "protein capture"
       OR "protein fouling" OR "protein separation" OR "protein purification")
      AND
      ("hydrogel formulation" OR "hydrogel fabrication" OR synthesis
       OR crosslink* OR "crosslinking density" OR gelation
       OR cryopolymerization OR grafting OR coating OR regeneration
       OR elution OR "scale-up" OR "process window")
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)

  # Q10: hydrogel libraries, high-throughput screening, and data-driven design.
  - >-
    TITLE-ABS-KEY(
      (
        "hydrogel library" OR "hydrogel libraries" OR "combinatorial hydrogel*"
        OR "high-throughput hydrogel*" OR "hydrogel array*"
        OR "hydrogel microarray*" OR "microgel library"
        OR "polymer hydrogel library"
        OR ((hydrogel* OR microgel* OR nanogel*) AND
            ("machine learning" OR "data-driven" OR "inverse design"
             OR screening OR combinatorial OR "protein binding profile"))
      )
      AND
      ("protein adsorption" OR "protein binding" OR "serum protein"
       OR "protein fouling" OR "nonspecific protein adsorption" OR biofouling
       OR "protein capture")
    ) AND PUBYEAR > 1999 AND PUBYEAR < 2027 AND DOCTYPE(ar)
  elsevier_rate_limit: 8
  thread_pool_size: 4
  wos_max_results: 50
  wos_max_workers: 4
